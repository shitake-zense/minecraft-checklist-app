  const TOTAL = ALL_CATEGORIES.reduce((s,c) => s + c.items.length, 0);

  // ============ Firebase 操作 ============
  function safeKey(name) {
    return encodeURIComponent(name).replace(/%/g, '_');
  }

  function loadFromFirebase(callback) {
    if (!db) { callback({}); return; }
    const r = ref(db, "checklist");
    get(r).then(snap => {
      const data = snap.val() || {};
      const result = {};
      Object.keys(data).forEach(k => {
        result[decodeURIComponent(k.replace(/_/g, '%'))] = data[k];
      });
      callback(result);
    }).catch(() => callback({}));
  }

  function toggleFirebase(itemName) {
    if (!db) {
      // デモモード: ローカルのみ
      checkedItems[itemName] = checkedItems[itemName]
        ? null
        : { by: playerName || "?", at: new Date().toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit"}) };
      if (!checkedItems[itemName]) delete checkedItems[itemName];
      renderAll();
      return;
    }
    const key = safeKey(itemName);
    const r = ref(db, `checklist/${key}`);
    get(r).then(snap => {
      if (snap.val()) {
        set(r, null);
      } else {
        set(r, {
          by: playerName || "匿名",
          at: new Date().toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit"})
        });
      }
    });
  }

  function subscribeFirebase() {
    if (!db) return;
    const r = ref(db, "checklist");
    onValue(r, snap => {
      const data = snap.val() || {};
      checkedItems = {};
      Object.keys(data).forEach(k => {
        const decoded = decodeURIComponent(k.replace(/_/g, '%'));
        checkedItems[decoded] = data[k];
      });
      renderAll();
    });
  }

  // ============ UI ============
  let currentFilter = "all";
  let searchQuery = "";

  function renderAll() {
    renderProgress();
    renderItems();
  }

  function renderProgress() {
    const count = Object.keys(checkedItems).length;
    const pct = Math.round((count / TOTAL) * 100);
    document.getElementById("prog-count").textContent = count;
    document.getElementById("prog-total").textContent = TOTAL;
    document.getElementById("prog-pct").textContent = pct + "%";
    document.getElementById("prog-bar-fill").style.width = pct + "%";
  }

  function renderItems() {
    const container = document.getElementById("items-container");
    container.innerHTML = "";
    const q = searchQuery.toLowerCase();

    ALL_CATEGORIES.forEach(cat => {
      if (currentFilter !== "all" && currentFilter !== cat.name) return;

      const filtered = cat.items.filter(item =>
        !q || item.toLowerCase().includes(q)
      );
      if (filtered.length === 0) return;

      const catChecked = filtered.filter(i => checkedItems[i]).length;
      const catPct = Math.round((catChecked / filtered.length) * 100);

      const section = document.createElement("section");
      section.className = "cat-section";

      const header = document.createElement("div");
      header.className = "cat-header";
      header.innerHTML = `
        <span class="cat-name">${cat.name}</span>
        <span class="cat-stat">${catChecked}/${filtered.length} <span class="cat-pct">${catPct}%</span></span>
      `;
      section.appendChild(header);

      const grid = document.createElement("div");
      grid.className = "item-grid";

      filtered.forEach(item => {
        const done = !!checkedItems[item];
        const info = checkedItems[item];
        const btn = document.createElement("button");
        btn.className = "item-btn" + (done ? " checked" : "");
        btn.setAttribute("data-item", item);
        btn.innerHTML = done
          ? `<span class="item-check">✅</span><span class="item-label">${item}</span><span class="item-by">${info?.by || ""}</span>`
          : `<span class="item-check">◻</span><span class="item-label">${item}</span>`;
        btn.onclick = () => {
          toggleFirebase(item);
          if (DEMO_MODE) {} // handled inside
        };
        grid.appendChild(btn);
      });

      section.appendChild(grid);
      container.appendChild(section);
    });
  }

  function buildCategoryTabs() {
    const tabs = document.getElementById("cat-tabs");
    const allBtn = document.createElement("button");
    allBtn.className = "tab-btn active";
    allBtn.textContent = "すべて";
    allBtn.onclick = () => { currentFilter = "all"; setActiveTab(allBtn); renderItems(); };
    tabs.appendChild(allBtn);

    ALL_CATEGORIES.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "tab-btn";
      btn.textContent = cat.name;
      btn.onclick = () => { currentFilter = cat.name; setActiveTab(btn); renderItems(); };
      tabs.appendChild(btn);
    });
  }

  function setActiveTab(active) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    active.classList.add("active");
  }

  // ============ 起動 ============
  window.addEventListener("DOMContentLoaded", () => {
    buildCategoryTabs();

    // プレイヤー名
    const nameEl = document.getElementById("player-name");
    nameEl.value = playerName;
    nameEl.addEventListener("change", () => {
      playerName = nameEl.value.trim();
      localStorage.setItem("mc_player", playerName);
    });

    // 検索
    document.getElementById("search-input").addEventListener("input", e => {
      searchQuery = e.target.value;
      renderItems();
    });

    // Firebase接続 or デモ
    if (DEMO_MODE) {
      document.getElementById("status-badge").textContent = "⚠️ デモモード（Firebase未設定）";
      document.getElementById("status-badge").className = "status-badge demo";
      renderAll();
    } else {
      document.getElementById("status-badge").textContent = "🔥 Firebase接続中...";
      subscribeFirebase();
    }
  });
</script>

<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --green: #3fb950;
  --green-dim: #1a4d2a;
  --green-bright: #56d364;
  --text: #e6edf3;

}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {

  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;

}

/* ヘッダー */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;

  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.header-title {
  font-size: 17px;
  font-weight: 900;
  color: var(--green-bright);

  white-space: nowrap;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.player-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 5px 10px;
  width: 130px;
}
.player-input:focus { outline: none; border-color: var(--green); }

.status-badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.status-badge.live { background: #1a3d1a; color: var(--green-bright); border: 1px solid var(--green); }
.status-badge.demo { background: #3d2a00; color: var(--yellow); border: 1px solid var(--yellow); }

/* 進捗 */
.progress-wrap {
  padding: 10px 16px 8px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
}
.prog-nums { font-size: 13px; color: var(--text-dim); }
.prog-nums b { color: var(--green-bright); font-size: 16px; }
.prog-pct { font-family: 'Share Tech Mono', monospace; font-size: 15px; color: var(--green); font-weight: bold; }
.progress-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--green-bright));
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* 検索 */
.search-wrap {
  padding: 10px 16px 0;
  display: flex;
  gap: 8px;
}
.search-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 8px 14px;
}
.search-input:focus { outline: none; border-color: var(--green); }
.search-input::placeholder { color: var(--text-muted); }

/* カテゴリタブ */
.tabs-wrap {
  padding: 8px 16px 0;
  overflow-x: auto;
  white-space: nowrap;
  display: flex;
  gap: 6px;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  padding: 5px 12px;
  white-space: nowrap;
  transition: all .15s;
}
.tab-btn:hover { border-color: var(--green); color: var(--green); }
.tab-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green-bright); font-weight: 700; }

/* アイテム一覧 */
#items-container { padding: 10px 12px; }

.cat-section {
  margin-bottom: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.cat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: #1c2128;
  border-bottom: 1px solid var(--border);
}
.cat-name { font-size: 13px; font-weight: 700; color: var(--green-bright); }
.cat-stat { font-size: 12px; color: var(--text-dim); }
.cat-pct { color: var(--green); font-weight: bold; }

.item-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 3px;
  padding: 6px;
}

.item-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 8px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  color: #8b949e;
  cursor: pointer;
  font-family: inherit;
  font-size: 11.5px;
  text-align: left;
  transition: all .12s;
  line-height: 1.35;
  position: relative;
}
.item-btn:hover {
  background: var(--surface2);
  border-color: var(--border);
  color: var(--text);
}
.item-btn.checked {
  background: #122118;
  border-color: #2ea043;
  color: #aff0b8;
}
.item-btn.checked:hover {
  background: #1a3322;
}
.item-check { font-size: 13px; flex-shrink: 0; }
.item-label { flex: 1; word-break: break-all; }
.item-by {
  font-size: 9px;
  color: var(--yellow);
  background: rgba(0,0,0,.4);
  border-radius: 3px;
  padding: 1px 4px;
  flex-shrink: 0;
  max-width: 50px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Firebase未設定バナー */
.setup-banner {
  margin: 10px 16px;
  padding: 12px 16px;
  background: #2d1f00;
  border: 1px solid var(--yellow);
  border-radius: 8px;
  font-size: 12px;
  color: #e3c77a;
  line-height: 1.6;
}
.setup-banner b { color: var(--yellow); }
.setup-banner code {
  background: #1a1200;
  border-radius: 3px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding: 1px 5px;
}
</style>
</head>
<body>

<header class="app-header">
  <span style="font-size:22px">⛏️</span>

<script type="module">
  // デモモード時のバナー表示
  window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      const badge = document.getElementById("status-badge");
      if (badge && badge.classList.contains("demo")) {
        document.getElementById("setup-banner-wrap").innerHTML = `
          <div class="setup-banner">
            <b>⚙️ Firebase未設定 — デモモードで動作中</b><br>
            フレンドとリアルタイム共有するには、下の手順でFirebaseを設定してください。<br>
            このファイル内の <code>firebaseConfig</code> に取得した設定を貼り付けてサーバーにアップロードするだけです。
          </div>`;
      } else if (badge) {
        badge.textContent = "🔥 Firebase接続済み・リアルタイム共有中";
        badge.className = "status-badge live";
      }
    }, 1500);
  });
