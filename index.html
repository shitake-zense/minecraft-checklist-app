<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛏️ マイクラ統合版 全アイテム収集チェックリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --green: #3fb950; --green-dim: #1a4d2a; --green-bright: #56d364;
  --text: #e6edf3; --text-dim: #7d8590; --text-muted: #484f58;
  --yellow: #e3b341; --red: #f85149; --blue: #58a6ff; --purple: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif; min-height: 100vh; }

/* ヘッダー */
.app-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 14px; position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.header-title { font-size: 15px; font-weight: 900; color: var(--green-bright); white-space: nowrap; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.player-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: inherit; font-size: 13px; padding: 5px 10px; width: 130px;
}
.player-input:focus { outline: none; border-color: var(--green); }
.hdr-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 12px;
  padding: 5px 11px; transition: all .15s; white-space: nowrap;
}
.hdr-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.hdr-btn.active { background: #3d2a00; border-color: var(--yellow); color: var(--yellow); font-weight: 700; }
.hdr-btn.edit-active { background: #1a3d1a; border-color: var(--green); color: var(--green-bright); font-weight: 700; }
.status-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.status-badge.live { background: #1a3d1a; color: var(--green-bright); border: 1px solid var(--green); }
.status-badge.demo { background: #3d2a00; color: var(--yellow); border: 1px solid var(--yellow); }

/* 進捗 */
.progress-wrap { padding: 9px 14px 7px; background: var(--surface); border-bottom: 1px solid var(--border); }
.progress-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.prog-nums { font-size: 13px; color: var(--text-dim); }
.prog-nums b { color: var(--green-bright); font-size: 16px; }
.prog-pct { font-family: 'Share Tech Mono', monospace; font-size: 15px; color: var(--green); font-weight: bold; }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-bright)); border-radius: 3px; transition: width .4s; }

/* 検索・タブ */
.search-wrap { padding: 9px 14px 0; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: inherit; font-size: 14px; padding: 8px 14px;
}
.search-input:focus { outline: none; border-color: var(--green); }
.search-input::placeholder { color: var(--text-muted); }
.tabs-wrap { padding: 8px 14px 0; overflow-x: auto; white-space: nowrap; display: flex; gap: 5px; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 12px;
  padding: 5px 11px; white-space: nowrap; transition: all .15s;
}
.tab-btn:hover { border-color: var(--green); color: var(--green); }
.tab-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green-bright); font-weight: 700; }
.tab-btn.custom-tab { border-color: #2d5a7a; color: #58a6ff; }
.tab-btn.custom-tab.active { background: #1a3040; }
.add-cat-tab { border-style: dashed !important; border-color: #3d3000 !important; color: var(--yellow) !important; }
.add-cat-tab:hover { background: #2d1f00 !important; }

/* アイテム一覧 */
#items-container { padding: 9px 10px 80px; }
.cat-section { margin-bottom: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.cat-header { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: #1c2128; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.cat-name { font-size: 13px; font-weight: 700; color: var(--green-bright); flex: 1; }
.cat-stat { font-size: 12px; color: var(--text-dim); }
.cat-pct { color: var(--green); font-weight: bold; }
.custom-badge { background: #1a2d40; border: 1px solid #2d5a7a; border-radius: 4px; color: var(--blue); font-size: 9px; padding: 1px 5px; }
.edit-cat-actions { display: flex; gap: 5px; }
.sm-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 11px; padding: 3px 8px; transition: all .12s;
}
.sm-btn:hover { border-color: var(--green); color: var(--green); }
.sm-btn.danger:hover { border-color: var(--red); color: var(--red); }

.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 2px; padding: 5px; }
.item-wrap { display: flex; flex-direction: column; }
.item-btn {
  display: flex; align-items: center; gap: 5px; padding: 6px 7px;
  background: transparent; border: 1px solid transparent; border-radius: 6px;
  color: #8b949e; cursor: pointer; font-family: inherit; font-size: 11.5px;
  text-align: left; transition: all .12s; line-height: 1.35; width: 100%;
}
.item-btn:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
.item-btn.checked { background: #122118; border-color: #2ea043; color: #aff0b8; }
.item-btn.checked:hover { background: #1a3322; }
.item-check { font-size: 13px; flex-shrink: 0; }
.item-label { flex: 1; word-break: break-all; }
.item-by { font-size: 9px; color: var(--yellow); background: rgba(0,0,0,.4); border-radius: 3px; padding: 1px 4px; flex-shrink: 0; max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-edit-row { display: flex; gap: 2px; padding: 0 4px 3px; justify-content: flex-end; }
.ie-btn { background: transparent; border: 1px solid transparent; border-radius: 4px; cursor: pointer; font-size: 11px; padding: 2px 5px; transition: all .1s; }
.ie-btn:hover { background: var(--surface2); border-color: var(--border); }
.ie-btn.del:hover { background: #2d1212; border-color: var(--red); }

/* モーダル */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; width: 100%; max-width: 400px;
}
.modal h3 { font-size: 15px; color: var(--green-bright); margin-bottom: 14px; }
.modal-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: inherit; font-size: 14px; padding: 9px 12px; margin-bottom: 12px;
}
.modal-input:focus { outline: none; border-color: var(--green); }
.modal-err { color: var(--red); font-size: 12px; margin-bottom: 8px; min-height: 18px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); cursor: pointer; font-family: inherit; font-size: 13px; padding: 8px 18px; transition: all .15s;
}
.modal-btn.primary { background: var(--green-dim); border-color: var(--green); color: var(--green-bright); font-weight: 700; }
.modal-btn:hover { border-color: var(--text-dim); }
.modal-btn.primary:hover { background: #1f5c1f; }

/* ランキングパネル */
.ranking-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--surface); border-top: 2px solid var(--border); transition: transform .3s ease;
}
.ranking-panel.collapsed { transform: translateY(calc(100% - 46px)); }
.ranking-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--border);
}
.ranking-toggle-title { font-size: 13px; font-weight: 700; color: var(--yellow); }
.ranking-toggle-arrow { color: var(--text-dim); font-size: 12px; transition: transform .3s; }
.ranking-panel:not(.collapsed) .ranking-toggle-arrow { transform: rotate(180deg); }
.ranking-body { padding: 12px 14px 16px; max-height: 60vh; overflow-y: auto; }
.ranking-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
.ranking-tabs::-webkit-scrollbar { display: none; }
.r-tab {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
  color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 11px; padding: 4px 12px;
}
.r-tab.active { background: #2d200a; border-color: var(--yellow); color: var(--yellow); font-weight: 700; }
.r-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.r-table th { color: var(--text-dim); font-weight: 400; text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--border); }
.r-table th.num { text-align: right; }
.r-table td { padding: 6px 8px; border-bottom: 1px solid #21262d; }
.r-table td.num { text-align: right; font-family: 'Share Tech Mono', monospace; color: var(--green-bright); }
.r-table tr:first-child td { color: var(--yellow); font-weight: 700; }
.r-table tr:nth-child(2) td { color: #c0c0c0; }
.r-table tr:nth-child(3) td { color: #cd7f32; }
.rank-medal { margin-right: 4px; }
.r-bar-wrap { display: flex; align-items: center; gap: 6px; }
.r-bar { height: 6px; background: var(--surface2); border-radius: 3px; flex: 1; overflow: hidden; }
.r-bar-fill { height: 100%; background: var(--yellow); border-radius: 3px; }
.no-data { color: var(--text-muted); font-size: 12px; padding: 16px; text-align: center; }
</style>
</head>

<!-- モーダル -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modal-title">アイテムを追加</h3>

    <div id="modal-err" class="modal-err"></div>
    <div class="modal-btns">
      <button class="modal-btn" id="modal-cancel">キャンセル</button>
      <button class="modal-btn primary" id="modal-ok">決定</button>
    </div>
  </div>
</div>

<div class="progress-wrap">

</div>

<div class="search-wrap">

</div>
<div class="tabs-wrap" id="cat-tabs"></div>
<div id="items-container"></div>

<!-- ランキングパネル（下部） -->
<div id="ranking-panel" class="ranking-panel collapsed">

</div>

// ========== 状態 ==========
let checkedItems = {};   // { itemName: { by, at } }
let customData = {};     // { cats: { catName: [items] }, deleted: [names], renamed: { old: new } }
let playerName = localStorage.getItem("mc_player") || "";
let editMode = false;
let currentFilter = "all";
let searchQuery = "";
let rankingCatFilter = "__all__";

// ========== ユーティリティ ==========
function safeKey(s) { return encodeURIComponent(s).replace(/%/g,'_'); }
function fromKey(s) { return decodeURIComponent(s.replace(/_/g,'%')); }

function getDeletedSet() { return new Set(customData.deleted || []); }
function getRenamedMap() { return customData.renamed || {}; }
function getCustomCats() { return customData.cats || {}; }

function resolvedName(orig) { return getRenamedMap()[orig] || orig; }
function isDeleted(orig) { return getDeletedSet().has(orig); }

function getCategories() {
  const deleted = getDeletedSet();
  const renamed = getRenamedMap();
  const catRenamed = customData.cat_renamed || {};
  const extraItems = customData.extra_items || {};
  const result = ALL_CATEGORIES.map(c => {
    const displayName = catRenamed[c.name] || c.name;
    const extras = (extraItems[c.name] || []).map(i => ({ orig: i, display: i }));
    return {
      name: displayName, origName: c.name, isCustom: false,
      items: [
        ...c.items.filter(i => !deleted.has(i)).map(i => ({ orig: i, display: renamed[i] || i })),
        ...extras
      ]
    };
  });
  Object.entries(getCustomCats()).forEach(([name, items]) => {
    result.push({ name, origName: name, isCustom: true, items: (items||[]).map(i => ({ orig: i, display: i })) });
  });
  return result;
}

function getAllDisplayNames() {
  const names = [];
  getCategories().forEach(c => c.items.forEach(it => names.push(it.display)));
  return names;
}

// ========== Firebase ==========
function saveCustom() {
  if (db) set(ref(db,"custom_data"), customData);
}

function toggleItem(displayName) {
  if (!db) {
    if (checkedItems[displayName]) delete checkedItems[displayName];
    else checkedItems[displayName] = { by: playerName||"?", at: new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}) };
    renderAll(); return;
  }
  const r = ref(db, `checklist/${safeKey(displayName)}`);
  get(r).then(snap => {
    if (snap.val()) set(r, null);
    else set(r, { by: playerName||"匿名", at: new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}) });
  });
}

// ---- 編集操作 ----
function doAddItem(catName, itemName, isCustomCat) {
  itemName = itemName.trim();
  if (!itemName) return "empty";
  if (getAllDisplayNames().includes(itemName)) return "dup";
  if (isCustomCat) {
    const cats = getCustomCats();
    if (!cats[catName]) cats[catName] = [];
    cats[catName].push(itemName);
    customData.cats = cats;
  } else {
    if (!customData.extra_items) customData.extra_items = {};
    if (!customData.extra_items[catName]) customData.extra_items[catName] = [];
    customData.extra_items[catName].push(itemName);
  }
  saveCustom(); return "ok";
}

function doRenameItem(catName, origName, newName, isCustomCat) {
  newName = newName.trim();
  if (!newName) return "empty";
  const currentDisplay = resolvedName(origName);
  if (newName === currentDisplay) return "same";
  // 重複チェック（自分の現在の表示名を除いた全アイテム名）
  const all = getAllDisplayNames().filter(n => n !== currentDisplay);
  if (all.includes(newName)) return "dup";

  if (isCustomCat) {
    const cats = getCustomCats();
    const arr = cats[catName] || [];
    const idx = arr.indexOf(origName);
    if (idx === -1) return "notfound";
    arr[idx] = newName;
    cats[catName] = arr;
    customData.cats = cats;
    if (db) get(ref(db,`checklist/${safeKey(origName)}`)).then(snap => {
      if (snap.val()) { set(ref(db,`checklist/${safeKey(newName)}`),snap.val()); set(ref(db,`checklist/${safeKey(origName)}`),null); }
    });
    else { if (checkedItems[origName]) { checkedItems[newName]=checkedItems[origName]; delete checkedItems[origName]; } }
  } else {
    const rn = getRenamedMap();
    const oldDisplay = rn[origName] || origName;
    // 元の名前に戻す場合はrenamedから削除
    if (newName === origName) {
      delete rn[origName];
    } else {
      rn[origName] = newName;
    }
    customData.renamed = rn;
    if (db) get(ref(db,`checklist/${safeKey(oldDisplay)}`)).then(snap => {
      if (snap.val()) { set(ref(db,`checklist/${safeKey(newName)}`),snap.val()); set(ref(db,`checklist/${safeKey(oldDisplay)}`),null); }
    });
    else { if (checkedItems[oldDisplay]) { checkedItems[newName]=checkedItems[oldDisplay]; delete checkedItems[oldDisplay]; } }
  }
  saveCustom(); return "ok";
}

function doDeleteItem(catName, origName, displayName, isCustomCat) {
  if (isCustomCat) {
    const cats = getCustomCats();
    cats[catName] = (cats[catName]||[]).filter(i=>i!==origName);
    customData.cats = cats;
  } else {
    if (!customData.deleted) customData.deleted = [];
    if (!customData.deleted.includes(origName)) customData.deleted.push(origName);
  }
  saveCustom();
  if (db) set(ref(db,`checklist/${safeKey(displayName)}`),null);
  else delete checkedItems[displayName];
}

function doAddCategory(catName) {
  catName = catName.trim();
  if (!catName) return "empty";
  const all = getCategories().map(c=>c.name);
  if (all.includes(catName)) return "dup";
  const cats = getCustomCats();
  cats[catName] = [];
  customData.cats = cats;
  saveCustom(); return "ok";
}

function doRenameCategory(catName, newName, isCustomCat) {
  newName = newName.trim();
  if (!newName || newName === catName) return "same";
  const allCatNames = getCategories().map(c => c.name).filter(n => n !== catName);
  if (allCatNames.includes(newName)) return "dup";

  if (isCustomCat) {
    // カスタムカテゴリの名前変更
    const cats = getCustomCats();
    const items = cats[catName] || [];
    delete cats[catName];
    cats[newName] = items;
    customData.cats = cats;
  } else {
    // ビルトインカテゴリの名前変更
    if (!customData.cat_renamed) customData.cat_renamed = {};
    customData.cat_renamed[catName] = newName;
  }
  saveCustom(); return "ok";
}

function doDeleteCategory(catName) {
  const cats = getCustomCats();
  const items = cats[catName] || [];
  items.forEach(i => {
    if (db) set(ref(db,`checklist/${safeKey(i)}`),null);
    else delete checkedItems[i];
  });
  delete cats[catName];
  customData.cats = cats;
  saveCustom();
}

// ========== モーダル ==========
let modalCallback = null;
function openModal(title, placeholder, initialVal, cb) {
  document.getElementById("modal-title").textContent = title;
  const input = document.getElementById("modal-input");
  input.placeholder = placeholder;
  input.value = initialVal || "";
  document.getElementById("modal-err").textContent = "";
  document.getElementById("modal-overlay").classList.remove("hidden");
  input.focus();
  modalCallback = cb;
}
function closeModal() { document.getElementById("modal-overlay").classList.add("hidden"); modalCallback = null; }

document.getElementById("modal-cancel").onclick = closeModal;
document.getElementById("modal-ok").onclick = () => {
  const val = document.getElementById("modal-input").value;
  if (modalCallback) {
    const result = modalCallback(val);
    if (result === "ok" || result === undefined) { closeModal(); return; }
    const msgs = { dup:"その名前はすでに存在します", empty:"名前を入力してください", same:"同じ名前です" };
    document.getElementById("modal-err").textContent = msgs[result] || result;
  }
};
document.getElementById("modal-input").addEventListener("keydown", e => { if (e.key==="Enter") document.getElementById("modal-ok").click(); if (e.key==="Escape") closeModal(); });
document.getElementById("modal-overlay").addEventListener("click", e => { if (e.target===document.getElementById("modal-overlay")) closeModal(); });

// ========== 描画 ==========
function renderAll() { renderProgress(); renderItems(); renderRanking(); }

function renderProgress() {
  const cats = getCategories();
  const total = cats.reduce((s,c)=>s+c.items.length,0);
  const count = Object.keys(checkedItems).length;
  const pct = total ? Math.round(count/total*100) : 0;
  document.getElementById("prog-count").textContent = count;
  document.getElementById("prog-total").textContent = total;
  document.getElementById("prog-pct").textContent = pct+"%";
  document.getElementById("prog-bar-fill").style.width = pct+"%";
}

function renderItems() {
  const container = document.getElementById("items-container");
  container.innerHTML = "";
  const q = searchQuery.toLowerCase();
  const cats = getCategories();

  cats.forEach(cat => {
    if (currentFilter !== "all" && currentFilter !== cat.name) return;
    const filtered = cat.items.filter(it => !q || it.display.toLowerCase().includes(q));
    if (filtered.length === 0 && !editMode) return;

    const catChecked = filtered.filter(it => checkedItems[it.display]).length;
    const catPct = filtered.length ? Math.round(catChecked/filtered.length*100) : 0;

    const section = document.createElement("section");
    section.className = "cat-section";

    // ヘッダー
    const header = document.createElement("div");
    header.className = "cat-header";

    const nameSpan = document.createElement("span");
    nameSpan.className = "cat-name";
    nameSpan.innerHTML = cat.name + (cat.isCustom ? ' <span class="custom-badge">カスタム</span>' : '');

    const statSpan = document.createElement("span");
    statSpan.className = "cat-stat";
    statSpan.innerHTML = `${catChecked}/${filtered.length} <span class="cat-pct">${catPct}%</span>`;

    header.appendChild(nameSpan);
    header.appendChild(statSpan);

    if (editMode) {
      const actions = document.createElement("div");
      actions.className = "edit-cat-actions";

      const addBtn = document.createElement("button");
      addBtn.className = "sm-btn";
      addBtn.textContent = "＋追加";
      addBtn.onclick = () => {
        openModal(`「${cat.name}」にアイテムを追加`, "アイテム名を入力...", "", val => doAddItem(cat.origName, val, cat.isCustom));

      actions.appendChild(addBtn);

      // カテゴリ名変更ボタン（全カテゴリ共通）
      const renCatBtn = document.createElement("button");
      renCatBtn.className = "sm-btn";
      renCatBtn.textContent = "✏️名前変更";
      renCatBtn.onclick = () => {
        openModal(`カテゴリ名を変更`, "新しいカテゴリ名...", cat.name, val => {
          const r = doRenameCategory(cat.origName, val, cat.isCustom);
          if (r === "ok") {
            if (currentFilter === cat.name) currentFilter = val.trim();
            rebuildTabs(); renderAll();
          }
          return r;
        });
      };
      actions.appendChild(renCatBtn);

      if (cat.isCustom) {
        const delCatBtn = document.createElement("button");
        delCatBtn.className = "sm-btn danger";
        delCatBtn.textContent = "🗑削除";
        delCatBtn.onclick = () => {
          if (confirm(`「${cat.name}」を削除しますか？\n中のアイテムとチェック状態もすべて削除されます。`)) {
            doDeleteCategory(cat.origName);
            if (currentFilter === cat.name) currentFilter = "all";
            rebuildTabs(); renderAll();
          }
        };
        actions.appendChild(delCatBtn);
      }
      header.appendChild(actions);
    }
    section.appendChild(header);

    // グリッド
    const grid = document.createElement("div");
    grid.className = "item-grid";

    filtered.forEach(it => {
      const done = !!checkedItems[it.display];
      const info = checkedItems[it.display];
      const wrap = document.createElement("div");
      wrap.className = "item-wrap";

      const btn = document.createElement("button");
      btn.className = "item-btn" + (done ? " checked" : "");
      btn.innerHTML = `<span class="item-check">${done ? '✅' : '◻'}</span><span class="item-label">${it.display}</span>${done && info?.by ? `<span class="item-by">${info.by}</span>` : ''}`;
      btn.onclick = () => { if (!editMode) toggleItem(it.display); };
      wrap.appendChild(btn);

      if (editMode) {
        const row = document.createElement("div");
        row.className = "item-edit-row";

        const renBtn = document.createElement("button");
        renBtn.className = "ie-btn";
        renBtn.title = "名前変更";
        renBtn.textContent = "✏️ 名前変更";
        renBtn.onclick = () => {
          openModal(`「${it.display}」の名前変更`, "新しい名前を入力...", it.display, val => doRenameItem(cat.name, it.orig, val, cat.isCustom));
        };

        const delBtn = document.createElement("button");
        delBtn.className = "ie-btn del";
        delBtn.title = "削除";
        delBtn.textContent = "🗑 削除";
        delBtn.onclick = () => {

          }
        };

        row.appendChild(renBtn);
        row.appendChild(delBtn);
        wrap.appendChild(row);
      }
      grid.appendChild(wrap);

    if (editMode && filtered.length === 0) {
      const empty = document.createElement("div");

    section.appendChild(grid);
    container.appendChild(section);
  });
}

// ========== タブ ==========
function rebuildTabs() {
  const tabs = document.getElementById("cat-tabs");
  tabs.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.className = "tab-btn" + (currentFilter==="all"?" active":"");
  allBtn.textContent = "すべて";
  allBtn.onclick = () => { currentFilter="all"; rebuildTabs(); renderItems(); };
  tabs.appendChild(allBtn);

  getCategories().forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (currentFilter===cat.name?" active":"") + (cat.isCustom?" custom-tab":"");
    btn.textContent = cat.name;
    btn.onclick = () => { currentFilter=cat.name; rebuildTabs(); renderItems(); };
    tabs.appendChild(btn);
  });

  if (editMode) {
    const addBtn = document.createElement("button");
    addBtn.className = "tab-btn add-cat-tab";
    addBtn.textContent = "＋ カテゴリ追加";
    addBtn.onclick = () => {
      openModal("新しいカテゴリを追加", "カテゴリ名を入力（例: 🧬 新カテゴリ）...", "", val => {
        const r = doAddCategory(val);
        if (r === "ok") { rebuildTabs(); renderItems(); }
        return r;
      });
    };
    tabs.appendChild(addBtn);
  }
}

// ========== ランキング ==========
function buildRankingTabs() {
  const tabsEl = document.getElementById("ranking-tabs");
  tabsEl.innerHTML = "";
  const cats = [{ name: "__all__", label: "🌍 全体" }, ...getCategories().map(c => ({ name: c.name, label: c.name }))];
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "r-tab" + (rankingCatFilter===c.name?" active":"");
    btn.textContent = c.label;
    btn.onclick = () => { rankingCatFilter = c.name; buildRankingTabs(); renderRankingTable(); };
    tabsEl.appendChild(btn);
  });
}

function renderRanking() { buildRankingTabs(); renderRankingTable(); }

function renderRankingTable() {
  const content = document.getElementById("ranking-content");

  // プレイヤー別集計
  const playerMap = {}; // { playerName: { total: N, cats: { catName: N } } }

  const cats = getCategories();
  const totalItems = cats.reduce((s,c)=>s+c.items.length, 0);

  cats.forEach(cat => {
    cat.items.forEach(it => {
      const info = checkedItems[it.display];
      if (info && info.by) {
        const p = info.by;
        if (!playerMap[p]) playerMap[p] = { total: 0, cats: {} };
        playerMap[p].total++;
        if (!playerMap[p].cats[cat.name]) playerMap[p].cats[cat.name] = 0;
        playerMap[p].cats[cat.name]++;
      }
    });
  });

  if (Object.keys(playerMap).length === 0) {
    content.innerHTML = '<div class="no-data">まだチェックされたアイテムがありません。<br>プレイヤー名を設定してアイテムをチェックすると表示されます。</div>';
    return;
  }

  // 表示対象のアイテム数・カテゴリ名
  let filterLabel = "全体";
  let filterTotal = totalItems;
  let getCount = p => playerMap[p]?.total || 0;

  if (rankingCatFilter !== "__all__") {
    const cat = cats.find(c => c.name === rankingCatFilter);
    filterLabel = rankingCatFilter;
    filterTotal = cat ? cat.items.length : 0;
    getCount = p => playerMap[p]?.cats[rankingCatFilter] || 0;
  }

  // ランキング生成
  const players = Object.keys(playerMap)
    .map(p => ({ name: p, count: getCount(p) }))
    .filter(p => p.count > 0)
    .sort((a,b) => b.count - a.count);

  if (players.length === 0) {
    content.innerHTML = `<div class="no-data">「${filterLabel}」でのチェックデータがありません。</div>`;
    return;
  }

  const medals = ["🥇","🥈","🥉"];
  const maxCount = players[0].count;

  const table = document.createElement("table");
  table.className = "r-table";
  table.innerHTML = `<thead><tr><th>順位</th><th>プレイヤー</th><th class="num">チェック数</th><th class="num">達成率</th><th style="width:80px">進捗</th></tr></thead>`;
  const tbody = document.createElement("tbody");

  players.forEach((p, i) => {
    const pct = filterTotal ? Math.round(p.count/filterTotal*100) : 0;
    const barPct = maxCount ? Math.round(p.count/maxCount*100) : 0;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="rank-medal">${medals[i]||''}</span>${i+1}位</td>
      <td>${p.name}</td>
      <td class="num">${p.count}</td>
      <td class="num">${pct}%</td>
      <td><div class="r-bar-wrap"><div class="r-bar"><div class="r-bar-fill" style="width:${barPct}%"></div></div></div></td>
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  content.innerHTML = `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">対象: ${filterLabel} (全${filterTotal}アイテム)</div>`;
  content.appendChild(table);
}

// ========== Firebase購読 ==========
function subscribe() {
  if (!db) { renderAll(); return; }
  onValue(ref(db,"checklist"), snap => {
    const data = snap.val()||{};
    checkedItems = {};
    Object.keys(data).forEach(k => { checkedItems[fromKey(k)] = data[k]; });
    renderAll();
  });
  onValue(ref(db,"custom_data"), snap => {
    customData = snap.val()||{};
    // 旧custom_itemsデータの自動移行（__deleted__/__renamed__形式）
    if (!customData.migrated_legacy) {
      get(ref(db,"custom_items")).then(legacySnap => {
        const legacy = legacySnap.val();
        if (legacy) {
          if (legacy.__deleted__ && Array.isArray(legacy.__deleted__)) {
            customData.deleted = [...new Set([...(customData.deleted||[]), ...legacy.__deleted__])];
          }
          if (legacy.__renamed__ && typeof legacy.__renamed__ === "object") {
            customData.renamed = { ...legacy.__renamed__, ...(customData.renamed||{}) };
          }
          customData.migrated_legacy = true;
          saveCustom();
        }
      });
    }
    rebuildTabs();
    renderAll();
  });
}

// ========== 初期化 ==========
window.addEventListener("DOMContentLoaded", () => {
  // プレイヤー名
  const nameEl = document.getElementById("player-name");
  nameEl.value = playerName;
  nameEl.addEventListener("change", () => { playerName = nameEl.value.trim(); localStorage.setItem("mc_player", playerName); });

  // 検索
  document.getElementById("search-input").addEventListener("input", e => { searchQuery = e.target.value; renderItems(); });

  // 編集モード
  document.getElementById("edit-mode-btn").onclick = () => {
    editMode = !editMode;
    const btn = document.getElementById("edit-mode-btn");
    btn.textContent = editMode ? "✅ 編集終了" : "✏️ 編集";
    btn.classList.toggle("edit-active", editMode);
    rebuildTabs(); renderAll();
  };

  // ランキング開閉
  document.getElementById("ranking-toggle").onclick = () => {
    document.getElementById("ranking-panel").classList.toggle("collapsed");
  };

  // Firebase or デモ
  if (DEMO_MODE) {
    document.getElementById("status-badge").textContent = "⚠️ デモモード";
    document.getElementById("status-badge").className = "status-badge demo";
    rebuildTabs(); renderAll();
  } else {
    document.getElementById("status-badge").textContent = "🔥 接続中...";
    subscribe();
    setTimeout(() => {
      const b = document.getElementById("status-badge");
      if (b.textContent === "🔥 接続中...") { b.textContent="🔥 Firebase接続済み"; b.className="status-badge live"; }
    }, 2000);
  }
});
</script>
